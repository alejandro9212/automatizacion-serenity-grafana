version: '3.8'
services:
  influxdb:
    image: influxdb:1.8
    container_name: influxdb_serenity
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=serenity_db
    # ESTO GUARDA TUS MÉTRICAS
    volumes:
      - ./influxdb_data:/var/lib/influxdb

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_serenity
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    # ESTO GUARDA TUS DASHBOARDS Y CONEXIONES
    volumes:
      - ./grafana_data:/var/lib/grafana