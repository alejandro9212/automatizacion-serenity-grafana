influx {
  url = ${?INFLUX_URL}
  token = ${?INFLUX_TOKEN}
  bucket = ${?INFLUX_BUCKET}
  org = "TU_CORREO_DE_REGISTRO" # Cambia esto por tu correo de InfluxDB
}

serenity {
  # Si la variable HEADLESS_CHROME existe en GitHub, la usa.
  # Si no, en tu PC será false por defecto.
  headless.mode = ${?HEADLESS_CHROME}

  take.screenshots = FOR_EACH_ACTION
  # ESTA LÍNEA ES LA QUE ACTIVA EL ESCANEO DE TU CLASE
  extension.packages = "co.com.grafana_serenity.automation.utils.Listener"
  encoding = "UTF-8"
  console.colors = true
  logging = VERBOSE
  timeout = 5000
  serenity.project.name = "Automatización Login OrangeHRM"
  # Generar reportes JSON es vital para que el Listener de Java lea los datos
  reports = ["single-page-html", "json"]
  report.accessibility = true
  # Verifica que no tengas ninguna restricción de métricas
}

webdriver {
  # Por defecto usamos chrome
  driver = chrome
  autodownload = true

  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = [
        "--remote-allow-origins=*",
        "--test-type",
        "--no-sandbox",
        "--ignore-certificate-errors",
        "--incognito",
        "--disable-infobars",
        "--disable-gpu",
        "--disable-default-apps",
        "--disable-popup-blocking",
        "--disable-dev-shm-usage",
        "--headless"
      ]
    }
  }
}

# --- Configuración de Ambientes ---
environments {
  default {
    webdriver.base.url = "https://opensource-demo.orangehrmlive.com/web/index.php/auth/login"
  }
  dev {
    webdriver.base.url = "https://dev-orangehrm.com/login"
  }
  qa {
    webdriver.base.url = "https://opensource-demo.orangehrmlive.com/web/index.php/auth/login"
    headless.mode = true
  }
  prod {
    webdriver.base.url = "https://opensource-demo.orangehrmlive.com/web/index.php/auth/login"
  }
}

# --- Mapeo para tu clase OpenWeb ---
pages {
  orangehrm = "#{webdriver.base.url}"
}